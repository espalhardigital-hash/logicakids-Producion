version: '3.8'

services:
  # ===== BACKEND API (FastAPI) =====
  backend:
    build:
      context: ../../LogicaMath/backend
      dockerfile: Dockerfile
    container_name: logicakids_local_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  # ===== FRONTEND (React + Nginx) =====
  frontend:
    build:
      context: ../../LogicaMath/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000/api
    container_name: logicakids_local_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
