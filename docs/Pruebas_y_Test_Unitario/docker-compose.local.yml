# =====================================================================
# DOCKER COMPOSE — ENTORNO 100% LOCAL (SIN VPS)
# =====================================================================
# Stack completo autocontenido: PostgreSQL + Redis + MinIO + Backend + Frontend
#
# NOTA: Esta configuración es TEMPORAL mientras no hay conexión SSH a la VPS.
#       Cuando se restaure la conexión, consultar:
#       docs/cambio_para_vps.md
#
# Uso:
#   docker compose -f docker-compose.local.yml up -d --build
#   docker compose -f docker-compose.local.yml down
#   docker compose -f docker-compose.local.yml down -v   (elimina volúmenes/datos)
# =====================================================================

services:
  # ===== POSTGRESQL 15 (Base de datos local) =====
  postgres:
    image: postgres:15-alpine
    container_name: logicakids_local_db
    environment:
      POSTGRES_DB: logicakids_local
      POSTGRES_USER: logicakids_local_user
      POSTGRES_PASSWORD: "LogicaKids2026#Local"
    ports:
      - "5433:5432"
    volumes:
      - logicakids_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logicakids_local_user -d logicakids_local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ===== REDIS 7 (Cache para FastAPI) =====
  redis:
    image: redis:7-alpine
    container_name: logicakids_local_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ===== MINIO (Storage S3-compatible para avatares) =====
  minio:
    image: minio/minio:latest
    container_name: logicakids_local_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: logicakids_minio_admin
      MINIO_ROOT_PASSWORD: "LogicaKids2026#MinIO"
    ports:
      - "9100:9000"    # API S3
      - "9101:9001"    # Console Web
    volumes:
      - logicakids_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===== MINIO SETUP (crea el bucket al inicio) =====
  minio-setup:
    image: minio/mc:latest
    container_name: logicakids_local_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set localminio http://minio:9000 logicakids_minio_admin 'LogicaKids2026#MinIO';
      mc mb --ignore-existing localminio/logicakids;
      mc anonymous set download localminio/logicakids;
      echo '✅ Bucket logicakids creado y configurado.';
      exit 0;
      "

  # ===== BACKEND API (FastAPI + Uvicorn) =====
  backend:
    build:
      context: ../../LogicaMath/backend
      dockerfile: Dockerfile
    container_name: logicakids_local_backend
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    restart: unless-stopped

  # ===== FRONTEND (React + Vite + Nginx) =====
  frontend:
    build:
      context: ../../LogicaMath/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000/api
    container_name: logicakids_local_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ===== TEST REPORTS SERVER =====
  test-reports:
    image: nginx:alpine
    container_name: logicakids_local_reports
    ports:
      - "9323:80"
    volumes:
      - ./resultados:/usr/share/nginx/html:ro
      - ./nginx-reports.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  logicakids_pgdata:
    name: logicakids_local_pgdata
  logicakids_minio_data:
    name: logicakids_local_minio_data
