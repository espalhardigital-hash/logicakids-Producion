version: '3.8'

services:
  # ===== BACKEND API (FastAPI) =====
  backend:
    build:
      context: ../LogicaMath/backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://logicakids_admin_desarrollo:logicakids_admin_desarrollo20258187@base_postgres_general:5432/bd_logicakids_desarrollo
      - SECRET_KEY=${SECRET_KEY}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    networks:
      - traefik_proxy
      - internal_services
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.${NOMBRE_APP:-logica_Kids}-api.rule=Host(`${DOMINIO:-logica.espalhar.shop}`) && PathPrefix(`/api`, `/docs`, `/redoc`, `/openapi.json`)'
      - 'traefik.http.routers.${NOMBRE_APP:-logica_Kids}-api.entrypoints=websecure'
      - 'traefik.http.routers.${NOMBRE_APP:-logica_Kids}-api.tls.certresolver=letsencrypt'
      - 'traefik.http.middlewares.${NOMBRE_APP:-logica_Kids}-stripprefix.stripprefix.prefixes=/api'
      - 'traefik.http.routers.${NOMBRE_APP:-logica_Kids}-api.middlewares=${NOMBRE_APP:-logica_Kids}-stripprefix'
      - 'traefik.http.services.${NOMBRE_APP:-logica_Kids}-api.loadbalancer.server.port=8000'

  # ===== FRONTEND (React + Nginx) =====
  frontend:
    build:
      context: ../LogicaMath/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-https://logica.espalhar.shop/api}
    restart: always
    networks:
      - traefik_proxy
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.${NOMBRE_APP:-logica_Kids}-web.rule=Host(`${DOMINIO:-logica.espalhar.shop}`)'
      - 'traefik.http.routers.${NOMBRE_APP:-logica_Kids}-web.entrypoints=websecure'
      - 'traefik.http.routers.${NOMBRE_APP:-logica_Kids}-web.tls.certresolver=letsencrypt'

networks:
  traefik_proxy:
    external: true
  internal_services:
    external: true